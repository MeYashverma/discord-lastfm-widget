name: Update Discord Widget

on:
  workflow_dispatch:
  # Optional safety fallback (in case self-trigger fails)
  schedule:
    - cron: "0 */6 * * *"

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Run Continuous Loop
        run: |
          echo "Starting continuous updater loop..."

          START_TIME=$(date +%s)

          while true
          do
            echo "----------------------------------"
            echo "Running update at $(date)"
            echo "----------------------------------"

            node update.js

            echo "Sleeping for 5 minutes..."
            sleep 300

            NOW=$(date +%s)
            ELAPSED=$((NOW - START_TIME))

            # Stop before GitHub timeout (~5h 50m)
            if [ $ELAPSED -gt 21000 ]; then
              echo "Approaching timeout, exiting loop..."
              break
            fi
          done
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USERNAME: ${{ secrets.LASTFM_USERNAME }}
          DISCORD_APP_ID: ${{ secrets.DISCORD_APP_ID }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}

      # ✅ SELF-TRIGGER NEXT RUN (Core Feature)
      - name: Trigger Next Run
        run: |
          echo "Triggering next workflow run..."

          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/update.yml/dispatches \
            -d '{"ref":"main"}'
